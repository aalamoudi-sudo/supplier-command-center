<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مركز قيادة الموردين — Supplier Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SUPPLIER COMMAND CENTER — Design System
   Brand: warm premium beige · deep red · orange
   Type:  IBM Plex Sans Arabic (UI) · IBM Plex Mono (data)
   ============================================================ */
:root{
  --beige:#F1EADC; --beige-2:#E8DFCD; --surface:#FBF7EF; --card:#FCF9F2;
  --card-2:#F6F0E4; --ink:#221E18; --ink-2:#6E655A; --ink-3:#9A8F7E;
  --line:#E4D9C6; --line-2:#EFE7D8;
  --primary:#B11D26; --primary-d:#7C1117; --primary-soft:#F3DDDC;
  --orange:#DC7A2E; --orange-soft:#F7E6D2;
  --green:#2F7D5B; --green-soft:#DCEAE0;
  --amber:#C28A1B; --amber-soft:#F4E8CB;
  --critical:#7C1117; --stone:#8A8073;
  --shadow:0 1px 2px rgba(60,45,25,.05),0 8px 24px -12px rgba(60,45,25,.18);
  --shadow-lg:0 24px 60px -28px rgba(60,40,20,.42);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --side:268px; --top:64px;
  --t:.32s cubic-bezier(.22,.61,.36,1);
}
[data-theme="dark"]{
  --beige:#16120D; --beige-2:#1E1813; --surface:#1C1711; --card:#221C15;
  --card-2:#2A2218; --ink:#F2EADC; --ink-2:#B6AB97; --ink-3:#857B68;
  --line:#34291C; --line-2:#2C2317;
  --primary:#D4313A; --primary-d:#A8222B; --primary-soft:#3A1C1B;
  --orange:#E8924A; --orange-soft:#3A2716; --green:#4FAE80; --green-soft:#19281F;
  --amber:#D8A537; --amber-soft:#2E2611; --critical:#E0454B;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 30px -16px rgba(0,0,0,.7);
  --shadow-lg:0 30px 70px -30px rgba(0,0,0,.8);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"IBM Plex Sans Arabic",system-ui,"Segoe UI",sans-serif;
  background:var(--beige); color:var(--ink);
  font-size:14px; line-height:1.55; letter-spacing:0;
  -webkit-font-smoothing:antialiased; overflow:hidden;
  transition:background var(--t),color var(--t);
}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace;font-feature-settings:"tnum"}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ---------- Splash / skeleton ---------- */
#splash{position:fixed;inset:0;z-index:99;background:var(--beige);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;
  transition:opacity .5s ease,visibility .5s}
#splash.hide{opacity:0;visibility:hidden}
.splash-mark{width:62px;height:62px;border-radius:16px;
  background:linear-gradient(145deg,var(--primary),var(--primary-d));
  display:grid;place-items:center;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.splash-mark::after{content:"";position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25),transparent 70%);
  transform:translateX(-120%);animation:sweep 1.6s infinite}
@keyframes sweep{to{transform:translateX(120%)}}
.splash-mark svg{width:30px;height:30px;color:#fff}
.splash-txt{font-weight:600;letter-spacing:.5px;color:var(--ink-2);font-size:13px}
.splash-bar{width:180px;height:4px;border-radius:20px;background:var(--line);overflow:hidden}
.splash-bar i{display:block;height:100%;width:40%;border-radius:20px;
  background:linear-gradient(90deg,var(--primary),var(--orange));animation:load 1.3s infinite}
@keyframes load{0%{transform:translateX(-140%)}100%{transform:translateX(360%)}}

/* ---------- Shell ---------- */
.app{display:grid;grid-template-columns:var(--side) 1fr;height:100vh}
.sidebar{background:var(--surface);border-inline-start:1px solid var(--line);
  display:flex;flex-direction:column;height:100vh;position:relative;z-index:20;
  transition:background var(--t),border-color var(--t)}
.brand{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.brand-mark{width:40px;height:40px;border-radius:11px;flex:none;
  background:linear-gradient(145deg,var(--primary),var(--primary-d));
  display:grid;place-items:center;box-shadow:0 6px 16px -6px var(--primary)}
.brand-mark svg{width:21px;height:21px;color:#fff}
.brand-t{font-weight:700;font-size:14px;line-height:1.25}
.brand-s{font-size:10.5px;color:var(--ink-3);letter-spacing:.6px;font-weight:500;
  text-transform:uppercase;font-family:"IBM Plex Mono"}
.nav{flex:1;overflow-y:auto;padding:12px 12px 20px}
.nav-grp{margin-top:14px}
.nav-grp:first-child{margin-top:4px}
.nav-lbl{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--ink-3);
  text-transform:uppercase;padding:6px 12px;font-family:"IBM Plex Mono"}
.nav-i{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);
  color:var(--ink-2);font-weight:500;font-size:13px;margin-bottom:2px;position:relative;
  transition:background .18s,color .18s;cursor:pointer;white-space:nowrap}
.nav-i svg{width:18px;height:18px;flex:none;opacity:.8}
.nav-i:hover{background:var(--card-2);color:var(--ink)}
.nav-i.on{background:var(--primary);color:#fff}
.nav-i.on svg{opacity:1}
.nav-i.on::before{content:"";position:absolute;inset-inline-start:-12px;top:50%;
  transform:translateY(-50%);width:3px;height:20px;border-radius:4px;background:var(--orange)}
.nav-i .badge{margin-inline-start:auto;font-size:10.5px;font-weight:600;
  background:var(--primary-soft);color:var(--primary);padding:1px 7px;border-radius:20px;font-family:"IBM Plex Mono"}
.nav-i.on .badge{background:rgba(255,255,255,.22);color:#fff}
.side-foot{padding:12px;border-top:1px solid var(--line)}
.user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);transition:background .18s}
.user:hover{background:var(--card-2)}
.avatar{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;
  font-weight:600;font-size:13px;color:#fff;background:linear-gradient(145deg,var(--orange),#b5611f)}
.user-n{font-size:12.5px;font-weight:600;line-height:1.2}
.user-r{font-size:10.5px;color:var(--ink-3)}

/* ---------- Topbar ---------- */
main{display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{height:var(--top);flex:none;display:flex;align-items:center;gap:16px;
  padding:0 24px;border-bottom:1px solid var(--line);background:var(--surface);
  transition:background var(--t),border-color var(--t)}
.crumb{display:flex;flex-direction:column;line-height:1.2;min-width:0}
.crumb b{font-size:16px;font-weight:700}
.crumb span{font-size:11px;color:var(--ink-3);font-family:"IBM Plex Mono"}
.search{margin-inline-start:auto;position:relative;width:300px;max-width:34vw}
.search input{width:100%;height:38px;border-radius:10px;border:1px solid var(--line);
  background:var(--card);padding:0 38px 0 14px;font-size:13px;color:var(--ink);
  transition:border-color .18s,box-shadow .18s}
.search input::placeholder{color:var(--ink-3)}
.search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.search svg{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--ink-3)}
.tb-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);
  display:grid;place-items:center;color:var(--ink-2);transition:.18s;position:relative}
.tb-btn:hover{color:var(--ink);border-color:var(--ink-3)}
.tb-btn svg{width:18px;height:18px}
.tb-btn .dot{position:absolute;top:8px;inset-inline-end:9px;width:7px;height:7px;border-radius:50%;
  background:var(--primary);border:2px solid var(--card)}
.clock{font-family:"IBM Plex Mono";font-size:12px;color:var(--ink-2);font-weight:500;
  display:flex;flex-direction:column;align-items:flex-end;line-height:1.3}
.clock b{color:var(--ink);font-weight:600}
.live-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--green);
  font-family:"IBM Plex Mono"}
.live-pill i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(47,125,91,.5)}50%{opacity:.5;box-shadow:0 0 0 5px rgba(47,125,91,0)}}

/* ---------- View ---------- */
.view{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth}
.view-in{max-width:1480px;margin:0 auto;animation:fade .45s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.row{display:grid;gap:18px}
.sec-h{display:flex;align-items:center;gap:12px;margin:6px 2px 14px}
.sec-h h3{font-size:15px;font-weight:700}
.sec-h .ln{flex:1;height:1px;background:var(--line)}
.sec-h .act{font-size:12px;color:var(--primary);font-weight:600}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s,border-color .2s}
.card.hov:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--line)}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-2)}
.card-h h4{font-size:13.5px;font-weight:700;flex:1}
.card-h .sub{font-size:11px;color:var(--ink-3);font-family:"IBM Plex Mono"}
.card-b{padding:18px}

/* KPI instrument tiles */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;
  position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi::before{content:"";position:absolute;top:0;inset-inline-start:0;width:100%;height:3px;
  background:var(--accent,var(--primary));opacity:.9}
.kpi .lbl{font-size:11px;color:var(--ink-3);font-weight:500;display:flex;align-items:center;gap:6px}
.kpi .lbl svg{width:13px;height:13px}
.kpi .val{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:4px;font-family:"IBM Plex Mono"}
.kpi .val small{font-size:14px;color:var(--ink-3);font-weight:500}
.kpi .delta{font-size:11px;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:3px}
.kpi .delta.up{color:var(--green)}.kpi .delta.down{color:var(--primary)}
.kpi .spark{position:absolute;bottom:0;inset-inline-end:0;width:72px;height:34px;opacity:.5}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:20px;white-space:nowrap;font-family:"IBM Plex Sans Arabic"}
.chip i{width:6px;height:6px;border-radius:50%;background:currentColor}
.c-green{background:var(--green-soft);color:var(--green)}
.c-amber{background:var(--amber-soft);color:var(--amber)}
.c-red{background:var(--primary-soft);color:var(--primary)}
.c-orange{background:var(--orange-soft);color:var(--orange)}
.c-stone{background:var(--card-2);color:var(--ink-2)}

/* table */
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--ink-3);text-align:start;padding:11px 14px;
  border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;
  position:sticky;top:0;background:var(--card);z-index:1}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line-2);font-size:13px;vertical-align:middle}
tbody tr{cursor:pointer;transition:background .14s}
tbody tr:hover{background:var(--card-2)}
tbody tr:last-child td{border-bottom:none}
.cellname{display:flex;align-items:center;gap:10px}
.sq{width:32px;height:32px;border-radius:8px;flex:none;display:grid;place-items:center;
  font-weight:700;font-size:12px;color:#fff}
.t-id{font-family:"IBM Plex Mono";font-size:12px;color:var(--ink-2)}

/* score bar */
.sbar{height:7px;border-radius:20px;background:var(--line-2);overflow:hidden;min-width:64px}
.sbar i{display:block;height:100%;border-radius:20px}

/* progress ring / gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-lbl{font-size:12px;color:var(--ink-2);font-weight:600;text-align:center}

/* heatmap */
.heat{display:grid;gap:5px}
.heat-row{display:grid;grid-template-columns:130px repeat(14,1fr);gap:5px;align-items:center}
.heat-row .hl{font-size:11.5px;color:var(--ink-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cellh{aspect-ratio:1;border-radius:5px;transition:transform .15s;cursor:pointer}
.cellh:hover{transform:scale(1.22);z-index:2;box-shadow:var(--shadow)}
.h0{background:var(--line-2)}
.h-g{background:#3a9b6e}.h-g2{background:#7fc3a0}
.h-a{background:#d6a93a}.h-r{background:#c0444a}

/* activity stream */
.stream{display:flex;flex-direction:column}
.act-i{display:flex;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line-2);animation:slidein .4s ease both}
.act-i:last-child{border-bottom:none}
@keyframes slidein{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.act-dot{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center}
.act-dot svg{width:15px;height:15px}
.act-txt{flex:1;min-width:0}
.act-txt b{font-weight:600;font-size:12.5px}
.act-txt p{font-size:12px;color:var(--ink-2);margin-top:1px}
.act-time{font-size:10.5px;color:var(--ink-3);font-family:"IBM Plex Mono";white-space:nowrap}

/* alerts */
.alert{display:flex;gap:12px;padding:13px;border-radius:var(--r-sm);margin-bottom:9px;
  border:1px solid var(--line);background:var(--card-2);position:relative;overflow:hidden}
.alert::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:var(--ac)}
.alert.crit{--ac:var(--primary)}.alert.warn{--ac:var(--amber)}.alert.info{--ac:var(--orange)}
.alert b{font-size:12.5px;font-weight:600}
.alert p{font-size:11.5px;color:var(--ink-2);margin-top:1px}

/* SLA timer */
.sla{font-family:"IBM Plex Mono";font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.sla.ok{color:var(--green)}.sla.warn{color:var(--amber)}.sla.crit{color:var(--primary)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:10px;
  font-weight:600;font-size:13px;transition:.18s;border:1px solid transparent}
.btn svg{width:16px;height:16px}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-d)}
.btn-o{background:var(--card);border-color:var(--line);color:var(--ink-2)}
.btn-o:hover{border-color:var(--ink-3);color:var(--ink)}
.btn-sm{height:32px;padding:0 12px;font-size:12px}

/* filters */
.filters{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.fchip{height:34px;padding:0 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);
  font-size:12.5px;font-weight:500;color:var(--ink-2);transition:.16s;display:inline-flex;align-items:center;gap:6px}
.fchip:hover{border-color:var(--ink-3)}
.fchip.on{background:var(--ink);color:var(--beige);border-color:var(--ink)}
.fchip .ct{font-family:"IBM Plex Mono";opacity:.7;font-size:11px}

/* empty / coming */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:54px 24px;gap:14px}
.empty .ic{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;
  background:var(--card-2);color:var(--ink-3)}
.empty .ic svg{width:30px;height:30px}
.empty h3{font-size:16px;font-weight:700}
.empty p{font-size:13px;color:var(--ink-2);max-width:420px}
.tag-soon{font-size:10px;font-weight:600;font-family:"IBM Plex Mono";letter-spacing:.5px;
  background:var(--orange-soft);color:var(--orange);padding:3px 9px;border-radius:20px}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(25,18,10,.42);z-index:60;opacity:0;visibility:hidden;
  transition:opacity .3s,visibility .3s;backdrop-filter:blur(2px)}
.scrim.on{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;inset-inline-start:0;height:100vh;width:min(540px,94vw);z-index:61;
  background:var(--surface);box-shadow:var(--shadow-lg);transform:translateX(-104%);
  transition:transform .36s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column}
[dir="rtl"] .drawer{transform:translateX(104%)}
.drawer.on{transform:translateX(0)!important}
.drawer-h{padding:20px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:flex-start}
.drawer-b{flex:1;overflow-y:auto;padding:20px}
.x{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;
  color:var(--ink-2);margin-inline-start:auto;flex:none}
.x:hover{background:var(--card-2)}

/* profile bits */
.pf-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}
.pf-s{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px}
.pf-s .l{font-size:11px;color:var(--ink-3)}
.pf-s .v{font-size:20px;font-weight:700;font-family:"IBM Plex Mono";margin-top:2px}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.kv:last-child{border:none}
.kv .k{color:var(--ink-3)}
.kv .v{font-weight:500}
.docline{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);
  border-radius:var(--r-sm);margin-bottom:8px}
.docline svg{width:17px;height:17px;color:var(--primary)}
.docline .dn{font-size:12.5px;font-weight:500;flex:1}
.docline .dm{font-size:10.5px;color:var(--ink-3);font-family:"IBM Plex Mono"}

/* lifecycle timeline */
.life{display:flex;align-items:center;gap:0;margin:10px 0;overflow-x:auto;padding-bottom:6px}
.life-n{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:92px;position:relative}
.life-n .ball{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;z-index:2;
  background:var(--card-2);color:var(--ink-3);border:2px solid var(--line)}
.life-n .ball svg{width:15px;height:15px}
.life-n.done .ball{background:var(--green);color:#fff;border-color:var(--green)}
.life-n.cur .ball{background:var(--primary);color:#fff;border-color:var(--primary);
  box-shadow:0 0 0 4px var(--primary-soft)}
.life-n .lt{font-size:10.5px;color:var(--ink-2);font-weight:500;text-align:center}
.life-l{height:2px;flex:1;background:var(--line);min-width:24px;margin-top:-22px}
.life-l.done{background:var(--green)}

/* ranking bars */
.rank-i{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-2)}
.rank-i:last-child{border:none}
.rank-n{width:22px;font-family:"IBM Plex Mono";font-weight:600;color:var(--ink-3);font-size:13px}
.rank-bar{flex:1;height:8px;border-radius:20px;background:var(--line-2);overflow:hidden}
.rank-bar i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--orange),var(--primary))}
.rank-v{font-family:"IBM Plex Mono";font-weight:600;font-size:13px;width:34px;text-align:end}

/* gantt mini */
.gantt{display:flex;flex-direction:column;gap:2px}
.gx{display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:center;padding:6px 0}
.gx .gl{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gx .gl.lvl2{padding-inline-start:14px;color:var(--ink-2);font-weight:400}
.gtrack{position:relative;height:24px;background:var(--card-2);border-radius:6px}
.gbar{position:absolute;top:4px;height:16px;border-radius:5px;display:flex;align-items:center;
  padding:0 7px;font-size:10px;color:#fff;font-weight:600;font-family:"IBM Plex Mono";overflow:hidden;white-space:nowrap}

/* toast */
.toast{position:fixed;bottom:22px;inset-inline-start:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--beige);padding:11px 20px;border-radius:12px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);z-index:90;opacity:0;visibility:hidden;transition:.3s;display:flex;align-items:center;gap:9px}
.toast.on{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--green)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g-2-1{display:grid;grid-template-columns:2fr 1fr;gap:18px}
.g-1-2{display:grid;grid-template-columns:1fr 2fr;gap:18px}
@media(max-width:1180px){.kpis{grid-template-columns:repeat(3,1fr)}.g-2-1,.g-1-2,.grid-3,.grid-2{grid-template-columns:1fr}}
@media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:fixed;inset-inline-start:0;width:var(--side);transform:translateX(104%);box-shadow:var(--shadow-lg)}.sidebar.open{transform:translateX(0)}.menu-btn{display:grid!important}.search{display:none}}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.view{padding:16px}}
.menu-btn{display:none}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}
</style>

/* SVG sparkline */
function spark(seed,col){
  let s=seed,pts=[];for(let i=0;i<14;i++){s=Math.sin(s*12.9898)*43758.5;pts.push(40+(s-Math.floor(s))*55+Math.sin(i/2)*8)}
  const max=Math.max(...pts),min=Math.min(...pts);
  const path=pts.map((p,i)=>`${(i/13*72).toFixed(1)},${(34-(p-min)/(max-min+.1)*30).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 72 34" preserveAspectRatio="none"><polyline points="${path}" fill="none" stroke="${col}" stroke-width="1.6"/></svg>`;
}
/* SVG arc gauge */
function gauge(v,label,size=120){
  const r=size/2-12,cx=size/2,cy=size/2,c=2*Math.PI*r,off=c*(1-v/100);
  return `<div class="gauge-wrap"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line-2)" stroke-width="9"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${scoreColor(v)}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dashoffset 1s ease"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-family="IBM Plex Mono" font-size="${size*.22}" font-weight="700" fill="var(--ink)">${v}</text>
    <text x="${cx}" y="${cy+size*.14}" text-anchor="middle" font-size="10" fill="var(--ink-3)">/ 100</text>
  </svg><div class="gauge-lbl">${label}</div></div>`;
}
/* SVG area trend */
function areaTrend(vals,col='var(--primary)',h=120,w=520){
  const max=Math.max(...vals)*1.1,min=Math.min(...vals)*.9;
  const X=i=>(i/(vals.length-1)*w).toFixed(1), Y=v=>(h-(v-min)/(max-min)*h*.86-8).toFixed(1);
  const line=vals.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
  const area=`0,${h} `+line+` ${w},${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".22"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#ag)"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    ${vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="2.4" fill="${col}"/>`).join('')}
  </svg>`;
}
/* SVG risk radar */
function radar(vals,labels){
  const n=vals.length,cx=130,cy=130,R=92;
  const pt=(i,r)=>[cx+Math.cos(-Math.PI/2+i/n*2*Math.PI)*r, cy+Math.sin(-Math.PI/2+i/n*2*Math.PI)*r];
  let rings='';[.25,.5,.75,1].forEach(f=>{rings+=`<polygon points="${vals.map((_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`});
  const poly=vals.map((v,i)=>pt(i,R*v/100).join(',')).join(' ');
  const axes=vals.map((_,i)=>{const[x,y]=pt(i,R);return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`}).join('');
  const labs=labels.map((l,i)=>{const[x,y]=pt(i,R+18);return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="10.5" fill="var(--ink-2)">${l}</text>`}).join('');
  return `<svg viewBox="0 0 260 260" width="100%" height="240">${rings}${axes}
    <polygon points="${poly}" fill="var(--primary)" fill-opacity=".18" stroke="var(--primary)" stroke-width="2"/>
    ${vals.map((v,i)=>{const[x,y]=pt(i,R*v/100);return `<circle cx="${x}" cy="${y}" r="3" fill="var(--primary)"/>`}).join('')}
    ${labs}</svg>`;
}

/* ============================================================
   ROUTER
   ============================================================ */
let streamTimer,slaTimer;
function go(id){
  const meta=NAV.flatMap(g=>g.items).find(i=>i.id===id)||NAV[0].items[0];
  renderNav(id);
  $('#crumbT').textContent=meta.t;$('#crumbS').textContent=meta.s;
  clearInterval(streamTimer);clearInterval(slaTimer);
  const fn=VIEWS[id]||(()=>scaffold('grid',meta.t,'هذه الوحدة جاهزة للبناء التفصيلي ضمن المرحلة القادمة.',['قيد التطوير']));
  $('#view').innerHTML=fn();
  $('.view').scrollTop=0;
  if(id==='exec'){startStream();}
  if(id==='escalations'){startSLA();}
  if(id==='settings'){bindSettings();}
  if(window.innerWidth<=980)$('#sidebar').classList.remove('open');
  location.hash=id;
}

/* live stream */
function startStream(){
  const el=$('#stream');if(!el)return;
  const add=()=>{const a=pick(ACTIVITY),s=pick(SUPPLIERS);
    const node=document.createElement('div');node.className='act-i';
    node.innerHTML=`<div class="act-dot ${a.c}">${ic(a.i,15)}</div>
      <div class="act-txt"><b>${a.b}</b><p>${a.p.replace('{s}',s.name).replace('{n}',ri(5,40))}</p></div>
      <div class="act-time">${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>`;
    el.prepend(node);while(el.children.length>7)el.lastChild.remove();};
  el.innerHTML='';for(let i=0;i<5;i++)add();
  streamTimer=setInterval(add,3800);
}
/* SLA ticking */
function startSLA(){
  const tick=()=>{document.querySelectorAll('[data-sla]').forEach(el=>{
    let v=+el.dataset.sla;v--;el.dataset.sla=v;
    const neg=v<0,h=Math.floor(Math.abs(v)/3600),m=Math.floor((Math.abs(v)%3600)/60),sc=Math.abs(v)%60;
    el.className='sla '+(neg?'crit':h<6?'warn':'ok');
    el.innerHTML=ic('clock',13)+(neg?'-':'')+`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  })};
  tick();slaTimer=setInterval(tick,1000);
}

/* settings bindings */
function bindSettings(){
  const imp=$('#importFile');if(imp)imp.onchange=e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=()=>toast('تم استيراد البيانات بنجاح');r.readAsText(f)}};
  const tb=$('#themeBtn2');if(tb)tb.onclick=toggleTheme;
}
function exportJSON(what){
  const data=what==='suppliers'?{suppliers:SUPPLIERS}:{suppliers:SUPPLIERS,permits:PERMITS.map(p=>({...p,sup:p.sup.id})),escalations:ESCS.map(e=>({...e,sup:e.sup.id}))};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`scc-${what}-${Date.now()}.json`;a.click();
  toast('تم تصدير '+(what==='suppliers'?'الموردين':'البيانات الكاملة'));
}

/* ============================================================
   THEME
   ============================================================ */
function toggleTheme(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark');
  $('#themeIc').innerHTML=d?'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>':'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8"/>';
  try{localStorage.setItem('scc-theme',d?'light':'dark')}catch(e){}
}

/* ============================================================
   CLOCK
   ============================================================ */
function tickClock(){
  const n=new Date();
  $('#ckTime').textContent=n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  $('#ckDate').textContent=n.toLocaleDateString('ar-SA',{weekday:'short',day:'numeric',month:'short'});
}

/* ============================================================
   EVENTS
   ============================================================ */
document.addEventListener('click',e=>{
  const go_=e.target.closest('[data-go]');if(go_){go(go_.dataset.go);return}
  const sup=e.target.closest('[data-sup]');if(sup){openSupplier(sup.dataset.sup);return}
  const sf=e.target.closest('[data-supf]');if(sf){supFilter=sf.dataset.supf;$('#view').innerHTML=VIEWS.suppliers();return}
  const pf=e.target.closest('[data-prmf]');if(pf){prmFilter=pf.dataset.prmf;$('#view').innerHTML=VIEWS.permits();return}
  const ex=e.target.closest('[data-export]');if(ex){exportJSON(ex.dataset.export);return}
});
$('#scrim').onclick=closeDrawer;
$('#themeBtn').onclick=toggleTheme;
$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('open');
$('#gsearch').addEventListener('input',e=>{
  const q=e.target.value.trim();if(!q)return;
  const hit=SUPPLIERS.find(s=>s.name.includes(q)||s.id.includes(q));
  if(hit&&e.target.value.length>2){/* live hint could go here */}
});
$('#gsearch').addEventListener('keydown',e=>{if(e.key==='Enter'){
  const q=e.target.value.trim();const hit=SUPPLIERS.find(s=>s.name.includes(q)||s.id.toLowerCase().includes(q.toLowerCase()));
  if(hit){go('suppliers');setTimeout(()=>openSupplier(hit.id),120)}else toast('لا توجد نتائج مطابقة')}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});

/* ============================================================
   BOOT
   ============================================================ */
(function init(){
  try{const t=localStorage.getItem('scc-theme');if(t==='dark')toggleTheme()}catch(e){}
  tickClock();setInterval(tickClock,1000);
  const start=(location.hash||'#exec').slice(1);
  setTimeout(()=>{$('#splash').classList.add('hide');go(VIEWS[start]?start:'exec')},900);
})();
</script>
